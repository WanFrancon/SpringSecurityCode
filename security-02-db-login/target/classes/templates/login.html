<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录页</title>
</head>
<body>
<form action="/login" method="post">

    账号：<input type="text" name="username">
    <br/>
    密码：<input type="password" name="password">
    <br/>
    <input type="submit" value="登 录"/>
    <!-- 需要把默认下的隐藏域写上，要Security接收到_csrf.token
    这是用来防止 CSRF（Cross-Site Request Forgery，跨站请求伪造
    可以通过：
    http.csrf().disable() 禁用
    -->
    <input type="hidden" name="_csrf" th:value="${_csrf.token}">

</form>
</body>
</html>

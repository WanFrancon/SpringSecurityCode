spring:
  application:
    name: security-02-db-login

#  security:
#    user:
#      name: fr
#      password: 123123

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 2005
    url: jdbc:mysql://localhost:3306/security_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8
    
    # Druid 专用配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
      filter:
        stat:
          enabled: true
        slf4j:
          enabled: true
        wall:
          enabled: true

mybatis:
  configuration:
    map-underscore-to-camel-case: true  # 开启自动驼峰命名

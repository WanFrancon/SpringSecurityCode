<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录页面</title>
</head>
<body>
<form th:action="@{/userLogin}" method="post">
    <label>
        账号：<input type="text" name="username" />
    </label>
    <br/>

    <label>
        密码：<input type="password" name="password" />
    </label>
    <br/>

    <label>
        验证码：<input type="text" name="captcha" />
    </label>
    <img id="captchaCode" th:src="@{/captchaCode}" style="cursor:pointer;" title="看不清？换一张" onclick="refreshCaptcha()"/>
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <br/>
    <button type="submit">登录</button>
</form>

<script th:inline="javascript">
    function refreshCaptcha() {
        var img = document.getElementById("captchaCode");
        img.src = "/captchaCode?random=" + Math.random();
    }
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://localhost:8080; img-src 'self' data:; style-src 'self' 'unsafe-inline';"
    />
    <title>Login</title>
    <link href="./css/index.css" rel="stylesheet" type="text/css" />
    <script src="./js/vue.global.js"></script>
    <script src="./js/element-plus.js"></script>
    <script src="./js/axios.min.js"></script>
  </head>

  <body>
    <div id="app">
      <!-- 登录表单 -->
      <section class="login">
        <h2>Login</h2>
        <el-form class="nameAndPwd" label-width="90px">
          <el-form-item label="Username">
            <el-input placeholder="Username" v-model="form.username"></el-input>
          </el-form-item>
          <el-form-item label="Password">
            <el-input
              placeholder="Password"
              v-model="form.password"
              type="password"
            ></el-input>
          </el-form-item>
          <el-form-item label="Captcha">
            <el-input
              placeholder="Captcha"
              v-model="form.captchaCode"
            ></el-input>
            <img
              v-if="captchaImage"
              :src="captchaImage"
              alt="captcha"
              style="
                width: 100px;
                height: 40px;
                margin-left: 8px;
                cursor: pointer;
                vertical-align: middle;
              "
              @click="refreshCaptcha"
            />
          </el-form-item>
        </el-form>
        <button @click="login">Login</button>
      </section>
    </div>
    <script>
      const { createApp, reactive, ref, onMounted } = Vue;

      createApp({
        setup() {
          const form = reactive({
            username: "zhangqi",
            password: "aaa111",
            captchaCode: "",
            captchaKey: "",
          });

          const captchaImage = ref("");

          // 刷新验证码
          const refreshCaptcha = () => {
            axios({
              method: "get",
              url: "http://localhost:8080/captchaCode",
            })
              .then((result) => {
                form.captchaKey = result.data?.data?.captchaKey || "";
                form.captchaCode = "";
                captchaImage.value = result.data?.data?.image || "";
              })
              .catch((err) => {
                console.error(err);
                alert("验证码加载失败");
              });
          };

          // 登录方法
          const login = () => {
            const params = new URLSearchParams();
            params.append("username", form.username);
            params.append("password", form.password);
            params.append("captchaCode", form.captchaCode); // 添加验证码输入到请求参数中
            params.append("captchaKey", form.captchaKey); // 添加验证码key到请求参数中

            axios({
              method: "post",
              url: "http://localhost:8080/user/login",
              data: params,
            })
              .then((result) => {
                const token = result.data?.data?.token;

                if (!token) {
                  alert("Login success, but token is missing");
                  return;
                }

                /*将登录响应存储在 浏览器 sessionStorage 中*/
                //方式一：使用 会话存储 存储登录响应(只在一个标签页中有效，关闭标签页后数据会被清除 推荐使用)
                window.sessionStorage.setItem("token", token);

                //   //方式二：使用 本地存储 存储登录响应（在浏览器关闭后数据仍会保留，不太安全）
                // window.localStorage.setItem(
                //   "token",
                //   JSON.stringify(token),
                // );
                alert("登录成功");

                // 登录成功后，可以选择跳转到wecom页面
                window.location.href = "./wellCom.html";
              })
              .catch((err) => {
                console.error(err);
                refreshCaptcha();
                alert(
                  err.response?.data?.message ||
                    err.response?.data ||
                    "登录失败，发生未知错误",
                );
              });
          };

          onMounted(() => {
            refreshCaptcha();
          });

          return {
            form,
            captchaImage,
            refreshCaptcha,
            login,
          };
        },
      })
        .use(ElementPlus)
        .mount("#app");
    </script>
  </body>
</html>
